# Telegram Bot 配置示例
# 复制此文件到 ~/.loom/telegram-bot.toml

# 全局设置
[settings]
# 下载目录（相对于工作目录或绝对路径）
download_dir = "downloads"
# 日志级别: trace, debug, info, warn, error
log_level = "info"
# 日志文件路径（可选，不设置则只输出到控制台）
# log_file = "logs/telegram-bot.log"
# 按日期分目录（可选）
organize_by_date = false
# 按聊天 ID 分目录（可选）
organize_by_chat = false
# 仅在机器人被 @ 时才响应（群聊场景）
only_respond_when_mentioned = false

# 机器人配置
# 每个机器人需要一个唯一的名称
[bots.assistant]
# 从 @BotFather 获取的 token
# 可以直接填写，或使用环境变量插值
token = "${TELOXIDE_TOKEN}"
# 是否启用此机器人
enabled = true
# 机器人描述（可选）
description = "助手机器人"

[bots.notification]
token = "987654321:XYZabcDEFghiJKLmnoPQRstuVWXyz"
enabled = true
description = "通知机器人"

[bots.test_bot]
token = "111222333:TESTtokenHERE"
enabled = false
description = "测试机器人（已禁用）"

