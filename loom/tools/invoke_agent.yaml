name: invoke_agent
description: |
  Delegate work to one or more sub-agents by profile name. Each sub-agent runs a full
  ReAct loop with its own tools and system prompt, then returns a final reply.

  Available agents are discovered from:
  - .loom/agents/<name>/  (project-level)
  - ~/.loom/agents/<name>/ (user-level)
  - Built-in: dev, agent-builder, explore

  Always pass a non-empty `agents` array. For one sub-agent, use a single element.
  Each `task` must be self-contained; sub-agents have no memory of the current conversation.

  Optional `fail_fast` applies when multiple agents run in parallel (sync mode).
  Set `async` to true to start all listed agent(s) in the background and return immediately.
input_schema:
  type: object
  properties:
    agents:
      type: array
      minItems: 1
      description: "Non-empty list of delegations. Each item has 'agent', 'task', and optional 'working_folder'."
      items:
        type: object
        properties:
          agent:
            type: string
            description: "Agent profile name or path to profile directory."
          task:
            type: string
            description: "Natural-language task to delegate; include full context."
          working_folder:
            type: string
            description: "Optional: override working folder for this sub-agent."
        required: [agent, task]
    fail_fast:
      type: boolean
      description: "When multiple agents run in parallel: if true, stop on first error. If false (default), collect all results. Ignored for a single agent or when async is true."
      default: false
    async:
      type: boolean
      description: "If true, start all listed agent(s) in the background and return immediately. Default: false."
      default: false
  required: [agents]
