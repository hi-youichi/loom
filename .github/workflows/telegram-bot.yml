name: telegram-bot CI

on:
  push:
    paths:
      - 'telegram-bot/**'
      - 'loom/**'
      - 'config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
  pull_request:
    paths:
      - 'telegram-bot/**'
      - 'loom/**'
      - 'config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Clippy + Test + Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Clippy
        run: cargo clippy -p telegram-bot --all-targets -- -D warnings

      - name: Test
        run: cargo test -p telegram-bot

      - name: Doc check
        run: cargo doc -p telegram-bot --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="telegram-bot") | .version')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
