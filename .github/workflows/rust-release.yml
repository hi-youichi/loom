name: Rust Release Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for generating release notes

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: Build release
        run: cargo build --release

      - name: Package binaries
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TARGET="x86_64-unknown-linux-gnu"
          mkdir -p dist
          tar -czvf "dist/loom-${VERSION}-${TARGET}.tar.gz" -C target/release loom

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            echo "## Changes since $PREV" > release_notes.md
            echo "" >> release_notes.md
            git log "$PREV..HEAD" --pretty=format:"* %s (%h)" >> release_notes.md
          else
            echo "## Release ${{ github.ref_name }}" > release_notes.md
            echo "" >> release_notes.md
            git log -5 --pretty=format:"* %s (%h)" >> release_notes.md
          fi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*.tar.gz
          generate_release_notes: true
          allow_updates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
